name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # All tests run on mocks — no provider keys / live calls in CI (CLAUDE.md §8).
      - name: Typecheck (engine + providers + curriculum + server)
        run: pnpm typecheck

      - name: Typecheck (Expo client)
        run: pnpm --filter @suara/client typecheck

      - name: Test
        run: pnpm test
